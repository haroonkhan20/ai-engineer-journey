<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SamBot — AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 750px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #1a1d27;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      padding: 20px 24px;
      background: #185FA5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p  { font-size: 12px; opacity: 0.8; }
    .clear-btn {
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      padding: 6px 14px; border-radius: 20px;
      cursor: pointer; font-size: 12px;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.25); }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Message bubbles */
    .message { display: flex; gap: 10px; align-items: flex-start; }

    .message.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #185FA5;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot .bubble {
      background: #2a2d3a;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bot  .avatar { background: #185FA5; }
    .user .avatar { background: #2a2d3a; }

    /* Typing indicator */
    .typing .bubble {
      display: flex; gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #888; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-8px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      background: #2a2d3a;
      border: 1px solid #3a3d4a;
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus  { border-color: #185FA5; }
    #user-input::placeholder { color: #666; }

    #send-btn {
      background: #185FA5;
      border: none; color: white;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }
    #send-btn:hover    { background: #1a6fc7; }
    #send-btn:disabled { background: #333; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>🤖 SamBot</h1>
      <p>AI Assistant · Built by Haroon Khan</p>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear chat</button>
  </div>

  <!-- Chat messages appear here -->
  <div class="chat-area" id="chat-area">
    <div class="message bot">
      <div class="avatar">🤖</div>
      <div class="bubble">Hi! I'm SamBot, your AI assistant. Ask me anything about AI, robotics, Python, or engineering!</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="user-input"
           placeholder="Ask SamBot anything..."
           onkeypress="handleKey(event)">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
  // Add a message bubble to the chat
  function addMessage(text, role) {
    const area   = document.getElementById('chat-area');
    const div    = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'bot' ? '🤖' : '👤'}</div>
      <div class="bubble">${text}</div>`;
    area.appendChild(div);
    // Auto scroll to bottom
    area.scrollTop = area.scrollHeight;
  }

  // Show typing dots while waiting for reply
  function showTyping() {
    const area = document.getElementById('chat-area');
    const div  = document.createElement('div');
    div.className = 'message bot typing';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  // Send message to Flask backend
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn   = document.getElementById('send-btn');
    const text  = input.value.trim();
    if (!text) return;

    // Show user message
    addMessage(text, 'user');
    input.value = '';
    btn.disabled = true;
    showTyping();

    try {
      // POST request to /chat route in app.py
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await response.json();
      hideTyping();
      addMessage(data.reply, 'bot');
    } catch (error) {
      hideTyping();
      addMessage('Sorry, something went wrong. Try again!', 'bot');
    }

    btn.disabled = false;
    input.focus();
  }

  // Send on Enter key
  function handleKey(event) {
    if (event.key === 'Enter') sendMessage();
  }

  // Clear chat memory
  async function clearChat() {
    await fetch('/clear', { method: 'POST' });
    const area = document.getElementById('chat-area');
    area.innerHTML = `
      <div class="message bot">
        <div class="avatar">🤖</div>
        <div class="bubble">Chat cleared! Fresh start. Ask me anything!</div>
      </div>`;
  }
</script>
</body>
</html>
